<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – GreenThreads | Recycled Fashion</title>
  <meta name="description" content="Create your GreenThreads account to start shopping and selling recycled clothing."/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<!-- Back to Home Button -->
<div class="back-to-home">
  <a href="index.html" class="btn btn-outline btn-sm">
    <span>←</span> Back to Home
  </a>
</div>

<div class="auth-page">
  <!-- Left Panel -->
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="big-leaf">🌿</div>
      <h1>Join GreenThreads</h1>
      <p>Create your account and start your eco-fashion journey today.</p>
      <div style="margin-top:40px;">
        <div style="background:rgba(255,255,255,.15);border-radius:16px;padding:24px;">
          <div style="font-size:2.5rem;font-weight:800;color:#fff;">50K+</div>
          <div style="font-size:.9rem;opacity:.8;">Active eco shoppers</div>
          <div style="border-top:1px solid rgba(255,255,255,.15);margin:16px 0;"></div>
          <div style="font-size:2.5rem;font-weight:800;color:#fff;">1.2M</div>
          <div style="font-size:.9rem;opacity:.8;">kg CO₂ saved</div>
          <div style="border-top:1px solid rgba(255,255,255,.15);margin:16px 0;"></div>
          <div style="font-size:2.5rem;font-weight:800;color:#fff;">200K+</div>
          <div style="font-size:.9rem;opacity:.8;">Recycled garments listed</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right" style="overflow-y:auto;">
    <div class="auth-form-wrap">
      <h2>Create Account ✨</h2>
      <p class="auth-sub">Join the eco-fashion revolution</p>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label">Select Your Role</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="user" checked>
              <span class="role-icon">👤</span>
              <span class="role-text">User</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="admin">
              <span class="role-icon">🛡️</span>
              <span class="role-text">Admin</span>
            </label>
          </div>
        </div>

        <!-- User Signup Fields -->
        <div id="user-signup-fields">
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input class="form-control" type="text" id="fullname" name="fullname" placeholder="Priya Sharma" required/>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="s-email">Email</label>
              <input class="form-control" type="email" id="s-email" name="email" placeholder="you@email.com" required/>
            </div>
            <div class="form-group">
              <label class="form-label" for="mobile">Mobile Number</label>
              <input class="form-control" type="tel" id="mobile" name="mobile" placeholder="9876543210" pattern="[0-9]{10}"/>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input class="form-control" type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8"/>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm Password</label>
              <input class="form-control" type="password" id="confirm-password" name="confirm_password" placeholder="Re-enter password" required/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Delivery Address</label>
            <textarea class="form-control" id="address" name="address" rows="3" placeholder="House/Flat No., Street, City, State, PIN" required></textarea>
          </div>
        </div>

        <!-- Admin Signup Fields -->
        <div id="admin-signup-fields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="admin-email">Email / Mobile Number</label>
            <input class="form-control" type="text" id="admin-email" name="admin-email" placeholder="admin@greenthreads.com or 9876543210" required/>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="admin-password">Password</label>
              <input class="form-control" type="password" id="admin-password" name="admin-password" placeholder="Min. 8 characters" required minlength="8"/>
            </div>
            <div class="form-group">
              <label class="form-label" for="admin-confirm-password">Confirm Password</label>
              <input class="form-control" type="password" id="admin-confirm-password" name="admin-confirm-password" placeholder="Re-enter password" required/>
            </div>
          </div>
        </div>

        <div class="form-group" style="display:flex;align-items:flex-start;gap:10px;">
          <input type="checkbox" id="terms" required style="width:16px;height:16px;accent-color:var(--green-mid);cursor:pointer;margin-top:3px;"/>
          <label for="terms" style="font-size:.88rem;color:var(--text-muted);cursor:pointer;line-height:1.5;">
            I agree to the <a href="#" style="color:var(--green-mid);font-weight:600;">Terms of Service</a> and <a href="#" style="color:var(--green-mid);font-weight:600;">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-bottom:16px;">Create Account</button>
      </form>


      <div class="auth-footer-link">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
